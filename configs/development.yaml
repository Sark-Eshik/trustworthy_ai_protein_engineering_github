# configs/development.yaml
hardware:
  cpu_count: 4
  ram_limit_gb: 16.0
  gpu_enabled: false

logging:
  level: "DEBUG"
  log_to_file: true
  log_to_console: true

experiment:
  enabled: true
  tracker_dir: "results/experiment_tracker"

datasets:
  megascale_d_path: "data/raw/megascale_d/megascale_d.parquet"
  protein_sequences_path: "data/raw/sequences/protein_sequences.parquet"
  protein_structures_path: "data/raw/structures/protein_structures.parquet"
